<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Board - Collaborative Free Form Drawing</title>
    <link rel="apple-touch-icon" sizes="57x57" href="resources/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="resources/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="resources/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="resources/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="resources/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="resources/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="resources/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="resources/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="resources/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="resources/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="resources/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="resources/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="resources/favicon-16x16.png">
    <link rel="shortcut icon" href="resources/favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007bff">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --toolbar-bg: rgba(255, 255, 255, 0.9);
            --accent-color: #007bff;
            --text-color: #333;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
        }

        #canvas {
            display: block;
            cursor: crosshair;
            background-color: white;
            touch-action: none;
        }

        .toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toolbar-bg);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            z-index: 100;
            border: 1px solid rgba(0, 0, 0, 0.05);
            max-width: 95vw;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .toolbar::-webkit-scrollbar {
            display: none;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .tool-group label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tool-icon {
            display: none;
            width: 20px;
            height: 20px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            white-space: nowrap;
        }

        input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: none;
            padding: 0;
            flex-shrink: 0;
        }

        input[type="range"] {
            width: 100px;
            cursor: pointer;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background-color: var(--accent-color);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        button .btn-text {
            display: inline;
        }

        button .tool-icon {
            display: none;
            width: 20px;
            height: 20px;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:active {
            transform: scale(0.95);
        }

        button.clear-btn {
            background-color: #dc3545;
        }

        button.undo-btn {
            background-color: #6c757d;
        }

        button.undo-btn:hover {
            background-color: #5a6268;
        }

        button.undo-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .collab-panel {
            position: fixed;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toolbar-bg);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 99;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            font-size: 14px;
        }

        #peerIdDisplay {
            font-family: monospace;
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        @media (max-width: 850px) {
            .toolbar {
                padding: 8px 12px;
                gap: 10px;
            }
            .tool-group label span {
                display: none;
            }
            .tool-icon {
                display: block;
            }
            button .btn-text {
                display: none;
            }
            button .tool-icon {
                display: block;
            }
            button {
                padding: 8px;
                border-radius: 50%;
            }
            input[type="range"] {
                width: 60px;
            }
            .collab-panel {
                top: 75px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }

        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: #888;
            background: rgba(255, 255, 255, 0.7);
            padding: 5px 10px;
            border-radius: 10px;
            pointer-events: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <label for="colorPicker" aria-label="Brush Color">
                <svg class="tool-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                </svg>
                <span>Brush</span>
            </label>
            <input type="color" id="colorPicker" value="#000000">
        </div>
        <div class="tool-group">
            <label for="bgColorPicker" aria-label="Background Color">
                <svg class="tool-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
                </svg>
                <span>Background</span>
            </label>
            <input type="color" id="bgColorPicker" value="#ffffff">
        </div>
        <div class="tool-group">
            <label for="brushSize" aria-label="Brush Size">
                <svg class="tool-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7.5l3 3m0 0l3-3m-3 3v13.5m0-13.5L12 3m0 0l-3 3m3-3l3 3M4.5 21h15M4.5 18h10M4.5 15h15M4.5 12h10M4.5 9h15" />
                </svg>
                <span>Size</span>
            </label>
            <input type="range" id="brushSize" min="1" max="50" value="5">
        </div>
        <button id="undoBtn" class="undo-btn" disabled aria-label="Undo">
            <svg class="tool-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
            </svg>
            <span class="btn-text">Undo</span>
        </button>
        <button id="clearBtn" class="clear-btn" aria-label="Clear">
            <svg class="tool-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            <span class="btn-text">Clear</span>
        </button>
        <button id="fullscreenBtn" aria-label="Toggle Fullscreen">
            <svg class="tool-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
            </svg>
            <span class="btn-text">Fullscreen</span>
        </button>
        <button id="saveBtn" aria-label="Save Image">
            <svg class="tool-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            <span class="btn-text">Save</span>
        </button>
        <button id="collabModeBtn" style="background-color: #28a745;" aria-label="Together Mode">
            <svg class="tool-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z" />
            </svg>
            <span class="btn-text">Together</span>
        </button>
    </div>

    <div id="collabPanel" class="collab-panel hidden">
        <div id="setupMode">
            <button id="hostBtn">Host Board</button>
            <span>or</span>
            <input type="text" id="joinIdInput" placeholder="Enter Board ID" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc; width: 80px;">
            <button id="joinBtn">Join</button>
        </div>
        <div id="activeMode" class="hidden">
            <span>Board ID: <span id="peerIdDisplay">...</span></span>
            <span id="connectionStatus" style="margin-left: 10px; color: #28a745; font-weight: bold;">● Live</span>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="status">Zoom: 100% | Space+Drag to Pan</div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const bgColorPicker = document.getElementById('bgColorPicker');
        const brushSize = document.getElementById('brushSize');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        const undoBtn = document.getElementById('undoBtn');
        const collabModeBtn = document.getElementById('collabModeBtn');
        const collabPanel = document.getElementById('collabPanel');

        // PeerJS Variables
        let peer = null;
        let connections = [];
        let isHost = false;
        const BOARD_PREFIX = 'vboard-';

        let isDrawing = false;
        let isPanning = false;
        let isPanningDrag = false;
        let lastX = 0;
        let lastY = 0;
        
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        
        let strokes = []; // { color, size, points: [{x, y}] }
        let currentStroke = null;

        function getTransformedPoint(x, y) {
            return {
                x: (x - offsetX) / scale,
                y: (y - offsetY) / scale
            };
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function render() {
            // Clear and fill background
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = bgColorPicker.value;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Apply world transformation
            ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);

            // Draw all completed strokes
            [...strokes, currentStroke].filter(s => s).forEach(stroke => {
                if (stroke.points.length < 1) return;
                
                ctx.beginPath();
                ctx.strokeStyle = stroke.color;
                ctx.lineWidth = stroke.size;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';

                const pts = stroke.points;
                ctx.moveTo(pts[0].x, pts[0].y);
                
                for (let i = 1; i < pts.length; i++) {
                    ctx.lineTo(pts[i].x, pts[i].y);
                }
                ctx.stroke();
            });

            updateStatus();
            updateUndoButton();
        }

        let activePointers = new Map();
        let lastPinchDist = 0;
        let lastPinchMid = { x: 0, y: 0 };

        function updateStatus() {
            const status = document.querySelector('.status');
            const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            if (isTouch) {
                status.textContent = `Zoom: ${Math.round(scale * 100)}% | Pinch/Two-finger Pan | Tap to Draw`;
            } else {
                status.textContent = `Zoom: ${Math.round(scale * 100)}% | Space+Drag to Pan | Scroll to Zoom`;
            }
        }

        function updateUndoButton() {
            undoBtn.disabled = strokes.length === 0;
        }

        // Drawing events
        canvas.addEventListener('pointerdown', (e) => {
            canvas.setPointerCapture(e.pointerId);
            activePointers.set(e.pointerId, e);

            if (activePointers.size === 1) {
                if ((e.pointerType === 'mouse' ? e.button === 0 : true) && !isPanning) {
                    isDrawing = true;
                    const pt = getTransformedPoint(e.clientX, e.clientY);
                    currentStroke = {
                        color: colorPicker.value,
                        size: brushSize.value / scale, 
                        points: [pt]
                    };
                } else if (isPanning || (e.pointerType === 'mouse' && e.button === 1)) {
                    isPanningDrag = true;
                    [lastX, lastY] = [e.clientX, e.clientY];
                }
            } else if (activePointers.size === 2) {
                if (isDrawing) {
                    isDrawing = false;
                    currentStroke = null;
                }
                isPanningDrag = false;
                
                const pts = Array.from(activePointers.values());
                lastPinchDist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                lastPinchMid = {
                    x: (pts[0].clientX + pts[1].clientX) / 2,
                    y: (pts[0].clientY + pts[1].clientY) / 2
                };
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!activePointers.has(e.pointerId)) return;
            activePointers.set(e.pointerId, e);

            if (activePointers.size === 1) {
                if (isDrawing && currentStroke) {
                    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
                    for (let event of events) {
                        const pt = getTransformedPoint(event.clientX, event.clientY);
                        currentStroke.points.push(pt);
                    }
                    render();
                } else if (isPanningDrag) {
                    const dx = e.clientX - lastX;
                    const dy = e.clientY - lastY;
                    offsetX += dx;
                    offsetY += dy;
                    [lastX, lastY] = [e.clientX, e.clientY];
                    render();
                }
            } else if (activePointers.size === 2) {
                const pts = Array.from(activePointers.values());
                const dist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                const midX = (pts[0].clientX + pts[1].clientX) / 2;
                const midY = (pts[0].clientY + pts[1].clientY) / 2;

                const zoomFactor = dist / lastPinchDist;
                const oldScale = scale;
                scale *= zoomFactor;
                scale = Math.max(0.05, Math.min(scale, 20));
                
                const actualFactor = scale / oldScale;
                
                offsetX = midX - (midX - offsetX) * actualFactor + (midX - lastPinchMid.x);
                offsetY = midY - (midY - offsetY) * actualFactor + (midY - lastPinchMid.y);

                lastPinchDist = dist;
                lastPinchMid = { x: midX, y: midY };
                render();
            }
        });

        const handlePointerUp = (e) => {
            activePointers.delete(e.pointerId);
            
            if (activePointers.size === 0) {
                if (isDrawing && currentStroke) {
                    strokes.push(currentStroke);
                    broadcast({ type: 'STROKE', data: currentStroke });
                    currentStroke = null;
                    isDrawing = false;
                    render();
                }
                isPanningDrag = false;
            } else if (activePointers.size === 1) {
                const remainingPointer = activePointers.values().next().value;
                [lastX, lastY] = [remainingPointer.clientX, remainingPointer.clientY];
                lastPinchDist = 0;
            }
        };

        window.addEventListener('pointerup', handlePointerUp);
        window.addEventListener('pointercancel', handlePointerUp);

        // Zoom logic
        function handleZoom(delta, centerX, centerY) {
            const zoomSpeed = 0.1;
            const oldScale = scale;
            if (delta > 0) scale *= (1 + zoomSpeed);
            else scale /= (1 + zoomSpeed);

            scale = Math.max(0.05, Math.min(scale, 20));

            const ratio = scale / oldScale;
            offsetX = centerX - (centerX - offsetX) * ratio;
            offsetY = centerY - (centerY - offsetY) * ratio;

            render();
        }

        canvas.addEventListener('wheel', (e) => {
            handleZoom(-e.deltaY, e.clientX, e.clientY);
            e.preventDefault();
        }, { passive: false });

        // Controls
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                isPanning = true;
                canvas.style.cursor = 'grab';
                e.preventDefault();
            }
            if (e.ctrlKey) {
                if (e.code === 'ArrowUp') {
                    handleZoom(1, window.innerWidth / 2, window.innerHeight / 2);
                    e.preventDefault();
                } else if (e.code === 'ArrowDown') {
                    handleZoom(-1, window.innerWidth / 2, window.innerHeight / 2);
                    e.preventDefault();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                isPanning = false;
                canvas.style.cursor = 'crosshair';
            }
        });

        // Utils
        undoBtn.addEventListener('click', () => {
            strokes.pop();
            broadcast({ type: 'UNDO' });
            render();
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('Clear everything?')) {
                strokes = [];
                broadcast({ type: 'CLEAR' });
                render();
            }
        });

        bgColorPicker.addEventListener('input', () => {
            render();
            broadcast({ type: 'BG_COLOR', data: bgColorPicker.value });
        });

        saveBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `pizza-board-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });

        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenText = fullscreenBtn.querySelector('.btn-text');
        
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenText.textContent = 'Exit Full';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    fullscreenText.textContent = 'Fullscreen';
                }
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenText.textContent = 'Exit Full';
            } else {
                fullscreenText.textContent = 'Fullscreen';
            }
        });

        // TOGETHER MODE LOGIC
        collabModeBtn.addEventListener('click', () => {
            collabPanel.classList.toggle('hidden');
        });

        document.getElementById('hostBtn').addEventListener('click', () => {
            initPeer();
        });

        document.getElementById('joinBtn').addEventListener('click', () => {
            const id = document.getElementById('joinIdInput').value.trim();
            if (id) {
                initPeer(BOARD_PREFIX + id);
            }
        });

        function initPeer(targetId = null) {
            const myId = targetId ? null : BOARD_PREFIX + Math.floor(1000 + Math.random() * 9000);
            
            if (peer) peer.destroy();
            peer = new Peer(myId);
            
            peer.on('open', (id) => {
                document.getElementById('setupMode').classList.add('hidden');
                document.getElementById('activeMode').classList.remove('hidden');
                
                const displayId = (targetId || id).replace(BOARD_PREFIX, '');
                document.getElementById('peerIdDisplay').textContent = displayId;
                
                if (targetId) {
                    const conn = peer.connect(targetId);
                    setupConnection(conn);
                } else {
                    isHost = true;
                }
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id' && !targetId) {
                    initPeer();
                } else if (err.type === 'peer-not-found') {
                    alert('Board not found. Please check the ID.');
                    location.reload();
                } else {
                    console.error('PeerJS Error:', err.type);
                }
            });

            peer.on('connection', (conn) => {
                setupConnection(conn);
                if (isHost) {
                    setTimeout(() => {
                        conn.send({ 
                            type: 'INIT_STATE', 
                            data: { strokes, bgColor: bgColorPicker.value } 
                        });
                    }, 500);
                }
            });
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                connections.push(conn);
                document.getElementById('connectionStatus').textContent = `● Live (${connections.length})`;
            });

            conn.on('data', (msg) => {
                handleRemoteData(msg);
                if (isHost) {
                    connections.forEach(c => {
                        if (c !== conn) c.send(msg);
                    });
                }
            });

            conn.on('close', () => {
                connections = connections.filter(c => c !== conn);
                document.getElementById('connectionStatus').textContent = connections.length > 0 ? `● Live (${connections.length})` : '● Waiting...';
            });
        }

        function handleRemoteData(msg) {
            switch (msg.type) {
                case 'INIT_STATE':
                    strokes = msg.data.strokes;
                    bgColorPicker.value = msg.data.bgColor;
                    render();
                    break;
                case 'STROKE':
                    strokes.push(msg.data);
                    render();
                    break;
                case 'UNDO':
                    strokes.pop();
                    render();
                    break;
                case 'CLEAR':
                    strokes = [];
                    render();
                    break;
                case 'BG_COLOR':
                    bgColorPicker.value = msg.data;
                    render();
                    break;
            }
        }

        function broadcast(msg) {
            if (connections.length > 0) {
                connections.forEach(conn => conn.send(msg));
            }
        }

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // Initial render
        render();
    </script>
</body>
</html>
